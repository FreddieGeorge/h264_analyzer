name: Windows MSYS2

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MSYS2 UCRT64
        id: msys2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-qt6-base
            mingw-w64-ucrt-x86_64-qt6-tools
            mingw-w64-ucrt-x86_64-ffmpeg

      - name: Configure
        shell: msys2 {0}
        run: >
          cmake -S . -B build-msys2-ucrt -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_PREFIX_PATH=/ucrt64
          -DBUILD_TESTING=ON

      - name: Build
        shell: msys2 {0}
        run: cmake --build build-msys2-ucrt

      - name: Test
        shell: msys2 {0}
        run: ctest --test-dir build-msys2-ucrt --output-on-failure

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Package
        shell: pwsh
        env:
          MSYS2_LOCATION: ${{ steps.msys2.outputs.msys2-location }}
        run: |
          ./scripts/deploy-windows-msys2.ps1
          ./scripts/package-windows-installer.ps1 -Version "ci-${{ github.run_number }}"

      - name: Upload portable ZIP
        uses: actions/upload-artifact@v4
        with:
          name: ZStreamEye-windows-ucrt64-${{ github.sha }}
          path: dist/ZStreamEye-windows-ucrt64.zip
          retention-days: 14

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: ZStreamEye-windows-ucrt64-setup-${{ github.sha }}
          path: dist/ZStreamEye-*-windows-ucrt64-setup.exe
          retention-days: 14
