name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate release version
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $tagVersion = "${{ github.ref_name }}" -replace '^v', ''
          $cmake = Get-Content CMakeLists.txt -Raw
          $match = [regex]::Match($cmake, 'project\(H264Analyzer\s+VERSION\s+([0-9]+(?:\.[0-9]+){1,3})')
          if (-not $match.Success) {
            throw "Could not read project version from CMakeLists.txt"
          }
          $projectVersion = $match.Groups[1].Value
          if ($tagVersion -ne $projectVersion) {
            throw "Release tag version ($tagVersion) must match CMake project version ($projectVersion)"
          }

      - name: Set up MSYS2 UCRT64
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-qt6-base
            mingw-w64-ucrt-x86_64-qt6-tools
            mingw-w64-ucrt-x86_64-ffmpeg

      - name: Configure
        shell: msys2 {0}
        run: >
          cmake -S . -B build-msys2-ucrt -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_PREFIX_PATH=/ucrt64
          -DBUILD_TESTING=ON

      - name: Build
        shell: msys2 {0}
        run: cmake --build build-msys2-ucrt

      - name: Test
        shell: msys2 {0}
        run: ctest --test-dir build-msys2-ucrt --output-on-failure

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Package
        shell: pwsh
        run: |
          ./scripts/deploy-windows-msys2.ps1
          $version = "${{ github.ref_name }}"
          if ([string]::IsNullOrWhiteSpace($version) -or $version -eq "main") {
            $version = "manual-${{ github.run_number }}"
          }
          ./scripts/package-windows-installer.ps1 -Version $version
          Move-Item `
            -LiteralPath dist/H264Analyzer-windows-ucrt64.zip `
            -Destination "dist/H264Analyzer-$version-windows-ucrt64.zip" `
            -Force

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: H264Analyzer-${{ github.ref_name }}-windows-ucrt64
          path: |
            dist/H264Analyzer-*-windows-ucrt64.zip
            dist/H264Analyzer-*-windows-ucrt64-setup.exe
          retention-days: 30

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          make_latest: true
          files: |
            dist/H264Analyzer-*-windows-ucrt64.zip
            dist/H264Analyzer-*-windows-ucrt64-setup.exe
